AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'TaskManager Web Frontend - Blazor WebAssembly Static Hosting'

Parameters:
  Environment:
    Type: String
    Default: main
    Description: 'Environment name (typically branch name)'

  WebHostingBucket:
    Type: String
    Description: 'S3 bucket name for static web hosting'

Resources:
  # S3 Bucket for Static Web Hosting
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref WebHostingBucket
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3000

  # S3 Bucket Policy for Public Read Access
  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WebHostingBucket}/*'

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebBucket.RegionalDomainName
            Id: S3Origin
            S3OriginConfig:
              OriginAccessIdentity: ''
        Enabled: true
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          CachePolicyId: '4135ea2d-6df8-44a3-9df3-4b5a84be39ad' # CachingDisabled
        CacheBehaviors:
          - PathPattern: '_framework/*'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            CachePolicyId: '4cc58ec2-f86d-4fc4-8f25-7c6f7890f63a' # CachingOptimizedForUncompressedObjects
          - PathPattern: '*.css'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            CachePolicyId: '4cc58ec2-f86d-4fc4-8f25-7c6f7890f63a' # CachingOptimizedForUncompressedObjects
          - PathPattern: '*.js'
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            CachePolicyId: '4cc58ec2-f86d-4fc4-8f25-7c6f7890f63a' # CachingOptimizedForUncompressedObjects
        PriceClass: PriceClass_100
        HttpVersion: http2

Outputs:
  WebEndpoint:
    Description: 'Web application CloudFront URL'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  WebHostingBucketName:
    Description: 'S3 bucket name for static web hosting'
    Value: !Ref WebBucket
    Export:
      Name: !Sub 'TaskManager-${Environment}-WebHostingBucket'

  CloudFrontDistributionId:
    Description: 'CloudFront distribution ID'
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub 'TaskManager-${Environment}-CloudFrontId'